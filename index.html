<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BOMA Career Explorer — Frost Bank Tower</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1b2a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* ── HEADER ── */
header {
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
  z-index: 10;
}

.logo {
  font-size: 1.3rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.3px;
}
.logo span { color: #f59e0b; }

.header-sub {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

.header-hint {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.5);
}

.pulse-badge {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #f59e0b;
  animation: pulseBadge 2s ease-in-out infinite;
}
@keyframes pulseBadge {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.5); opacity:0.6; }
}

/* ── BUILDING WRAPPER ── */
#scene {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

#building-svg {
  height: 100%;
  width: 100%;
  max-height: calc(100vh - 62px);
  display: block;
}

/* ── ZONE HOTSPOT DOTS ── */
.hotspot {
  cursor: pointer;
}
.hotspot .ring {
  transform-origin: center;
  animation: ringPulse 2.4s ease-out infinite;
}
.hotspot .dot {
  animation: dotPulse 2.4s ease-in-out infinite;
}
.hotspot:hover .dot {
  filter: brightness(1.3);
}

@keyframes ringPulse {
  0%   { transform: scale(1); opacity: 0.85; }
  70%  { transform: scale(2.8); opacity: 0; }
  100% { transform: scale(2.8); opacity: 0; }
}
@keyframes dotPulse {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.18); }
}

/* ── OVERLAY ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
#overlay.active { opacity: 1; pointer-events: all; }

/* ── INFO PANEL ── */
#panel-wrap {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  perspective: 1400px;
  z-index: 200;
  pointer-events: none;
}

#panel {
  width: min(680px, 93vw);
  max-height: 88vh;
  background: #fff;
  border-radius: 22px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.3);
  transform-origin: center top;
  transform: rotateX(-80deg) scaleY(0.6);
  opacity: 0;
  transition: transform 0.5s cubic-bezier(0.34,1.4,0.64,1), opacity 0.35s ease;
  pointer-events: none;
}

#panel.open {
  transform: rotateX(0deg) scaleY(1);
  opacity: 1;
  pointer-events: all;
}
#panel-wrap.open { pointer-events: all; }

/* panel header */
.p-header {
  padding: 26px 28px 20px;
  color: #fff;
  position: relative;
  flex-shrink: 0;
}
.p-icon { font-size: 2.6rem; display: block; margin-bottom: 8px; line-height: 1; }
.p-title { font-size: 1.55rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.3px; }
.p-tagline { font-size: 0.9rem; opacity: 0.82; }

.close-btn {
  position: absolute; top: 16px; right: 16px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: none; color: #fff;
  font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.close-btn:hover { background: rgba(255,255,255,0.32); }

/* panel body */
.p-body {
  padding: 22px 28px 28px;
  overflow-y: auto;
  flex: 1;
}

.sec-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #94a3b8;
  margin-bottom: 10px;
  margin-top: 20px;
}
.sec-label:first-child { margin-top: 0; }

/* career cards */
.career-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
@media (max-width: 500px) {
  .career-grid { grid-template-columns: 1fr; }
}
.career-card {
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  padding: 11px 13px;
  background: #f8fafc;
  transition: border-color 0.15s;
}
.career-card:hover { border-color: #cbd5e1; }
.cc-title { font-weight: 700; font-size: 0.88rem; color: #1e293b; margin-bottom: 3px; }
.cc-salary { font-size: 0.78rem; color: #16a34a; font-weight: 700; }
.cc-note { font-size: 0.73rem; color: #64748b; margin-top: 2px; }

/* pathways */
.path-list { list-style: none; }
.path-list li {
  padding: 7px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 0.875rem;
  color: #334155;
  display: flex; gap: 9px; align-items: flex-start;
}
.path-list li:last-child { border-bottom: none; }
.path-arrow { color: #f59e0b; font-weight: 800; flex-shrink: 0; margin-top: 1px; }

/* callout boxes */
.box-fact {
  background: #fffbeb; border: 1.5px solid #fde68a;
  border-radius: 14px; padding: 13px 15px; margin-top: 14px;
}
.box-fact .box-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #92400e; }
.box-fact p { font-size: 0.855rem; color: #78350f; margin-top: 4px; line-height: 1.55; }

.box-next {
  background: #f0fdf4; border: 1.5px solid #86efac;
  border-radius: 14px; padding: 13px 15px; margin-top: 10px;
}
.box-next .box-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #166534; }
.box-next p { font-size: 0.855rem; color: #14532d; margin-top: 4px; line-height: 1.55; }

/* ── BOTTOM NAV PILLS ── */
#zone-nav {
  position: fixed;
  bottom: 18px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 7px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 9px 14px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 50;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 95vw;
}
.nav-pill {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  color: rgba(255,255,255,0.75);
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.18s;
  white-space: nowrap;
}
.nav-pill:hover {
  color: #fff;
  border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.08);
}

/* ── ZONE HIGHLIGHT RECTS ── */
.z-hi {
  opacity: 0;
  transition: opacity 0.18s ease;
  pointer-events: all;
  cursor: pointer;
}
.z-hi:hover { opacity: 0.22; }

</style>
</head>

// ── BUILDING WINDOWS (JS-generated) ───────────────────
(function generateWindows() {
  const layer = document.getElementById('win-layer');
  const bands = document.getElementById('floor-bands');
  const BL = 285, BW = 275;
  const COLS = 8, COL_W = BW / COLS; // ~34.375
  const WIN_W = 21, WIN_H = 13;
  const ROW_H = 19;
  const START_Y = 78, END_Y = 486;
  const totalRows = Math.floor((END_Y - START_Y) / ROW_H);

  // Seed-ish random for consistent look
  let seed = 42;
  function rng() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }

  for (let row = 0; row < totalRows; row++) {
    const y = START_Y + row * ROW_H;
    if (y + WIN_H > END_Y) break;

    // Floor band every 4 rows
    if (row > 0 && row % 4 === 0) {
      const band = document.createElementNS(svgNS, 'rect');
      band.setAttribute('x', BL + 1);
      band.setAttribute('y', y - 3);
      band.setAttribute('width', BW - 2);
      band.setAttribute('height', 3);
      band.setAttribute('fill', 'rgba(0,0,0,0.25)');
      bands.appendChild(band);
    }

    for (let col = 0; col < COLS; col++) {
      const x = BL + 5 + col * COL_W + (COL_W - WIN_W) / 2;
      const rand = rng();
      const lit  = rand > 0.32;
      const warm = rng() > 0.55;

      let fill;
      if (lit) {
        if (warm) {
          const r = 245 + Math.floor(rng() * 10);
          const g = 165 + Math.floor(rng() * 45);
          const b = 40  + Math.floor(rng() * 30);
          const a = (0.65 + rng() * 0.3).toFixed(2);
          fill = `rgba(${r},${g},${b},${a})`;
        } else {
          const r = 80  + Math.floor(rng() * 50);
          const g = 150 + Math.floor(rng() * 70);
          const b = 215 + Math.floor(rng() * 40);
          const a = (0.55 + rng() * 0.35).toFixed(2);
          fill = `rgba(${r},${g},${b},${a})`;
        }
      } else {
        fill = 'rgba(8,18,34,0.85)';
      }

      const win = document.createElementNS(svgNS, 'rect');
      win.setAttribute('x', x.toFixed(1));
      win.setAttribute('y', y);
      win.setAttribute('width', WIN_W);
      win.setAttribute('height', WIN_H);
      win.setAttribute('fill', fill);
      win.setAttribute('rx', '0.5');
      layer.appendChild(win);
    }
  }
})();

// ── PANEL LOGIC ────────────────────────────────────────
const overlay    = document.getElementById('overlay');
const panelWrap  = document.getElementById('panel-wrap');
const panel      = document.getElementById('panel');
const pHeader    = document.getElementById('p-header');
const pIcon      = document.getElementById('p-icon');
const pTitle     = document.getElementById('p-title');
const pTagline   = document.getElementById('p-tagline');
const pBody      = document.getElementById('p-body');
const closeBtn   = document.getElementById('close-btn');

function openZone(id) {
  const d = ZONES[id];
  if (!d) return;

  pHeader.style.background = `linear-gradient(140deg, ${d.color} 0%, ${d.color}bb 100%)`;
  pIcon.textContent    = d.icon;
  pTitle.textContent   = d.title;
  pTagline.textContent = d.tagline;

  const careerCards = d.careers.map(c => `
    <div class="career-card">
      <div class="cc-title">${c.title}</div>
      <div class="cc-salary">${c.salary}</div>
      <div class="cc-note">${c.note}</div>
    </div>`).join('');

  const pathItems = d.pathways.map(p => `
    <li><span class="path-arrow">→</span>${p}</li>`).join('');

  pBody.innerHTML = `
    <div class="sec-label">Career Opportunities</div>
    <div class="career-grid">${careerCards}</div>
    <div class="sec-label">How to Get There</div>
    <ul class="path-list">${pathItems}</ul>
    <div class="box-fact">
      <div class="box-label">💡 Did You Know?</div>
      <p>${d.fact}</p>
    </div>
    <div class="box-next">
      <div class="box-label">✅ Your Next Steps</div>
      <p>${d.next}</p>
    </div>`;

  pBody.scrollTop = 0;
  overlay.classList.add('active');
  panelWrap.classList.add('open');
  panel.classList.add('open');
}

function closePanel() {
  overlay.classList.remove('active');
  panelWrap.classList.remove('open');
  panel.classList.remove('open');
}

closeBtn.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ── ATTACH CLICK EVENTS ────────────────────────────────
// Hotspot groups
document.querySelectorAll('.hotspot').forEach(el => {
  el.addEventListener('click', () => openZone(el.dataset.zone));
});

// Zone highlight rects
document.querySelectorAll('.z-hi').forEach(el => {
  el.addEventListener('click', () => openZone(el.dataset.zone));
});

// ── BOTTOM NAV PILLS ──────────────────────────────────
const nav = document.getElementById('zone-nav');
const PILL_COLORS = {
  roof:       '#f97316',
  offices:    '#8b5cf6',
  windows:    '#3b82f6',
  janitorial: '#14b8a6',
  lobby:      '#ef4444',
  landscape:  '#22c55e',
  parking:    '#94a3b8',
  waste:      '#10b981',
};
const PILL_LABELS = {
  roof: 'Roof & HVAC', offices: 'Offices', windows: 'Windows',
  janitorial: 'Facilities', lobby: 'Lobby & Security',
  landscape: 'Landscape', parking: 'Parking', waste: 'Sustainability',
};
Object.keys(ZONES).forEach(id => {
  const pill = document.createElement('div');
  pill.className = 'nav-pill';
  pill.textContent = PILL_LABELS[id];
  pill.style.setProperty('--c', PILL_COLORS[id]);
  pill.addEventListener('click', () => openZone(id));
  pill.addEventListener('mouseenter', () => {
    pill.style.background = PILL_COLORS[id] + '33';
    pill.style.borderColor = PILL_COLORS[id];
    pill.style.color = '#fff';
  });
  pill.addEventListener('mouseleave', () => {
    pill.style.background = '';
    pill.style.borderColor = '';
    pill.style.color = '';
  });
  nav.appendChild(pill);
});
</script>
